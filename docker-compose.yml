name: openexcel

services:
  server:
    image: ghcr.io/openexcel/openexcel:latest
    container_name: openexcel-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/.data/prod.db
    volumes:
      - openexcel-data:/app/.data
      - ./config:/app/config

volumes:
  openexcel-data: