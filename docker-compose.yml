name: openexcel

services:
  server:
    image: ${OPENEXCEL_IMAGE:-openexcel:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openexcel-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/.data/openexcel.db
      - OPENEXCEL_STORAGE_ROOT=/app/.data/storage
    volumes:
      - openexcel-data:/app/.data

volumes:
  openexcel-data:
