name: openexcel

services:
  server:
    image: ghcr.io/openexcel/openexcel:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openexcel-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_PROVIDER=sqlite
    volumes:
      - openexcel-data:/app/.data

volumes:
  openexcel-data:
