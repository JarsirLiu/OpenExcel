name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is declared once in the root package.json packageManager field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database artifacts
        run: |
          pnpm --filter @openexcel/server db:generate
          pnpm db:migrate

      - name: Check (lint + format + typecheck)
        run: pnpm check

      - name: Test
        run: pnpm -r --filter @openexcel/agent --filter @openexcel/core --filter @openexcel/server test

      - name: Build Docker image
        run: docker build -t openexcel:ci .
